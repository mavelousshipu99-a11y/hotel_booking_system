<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking System</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; border-bottom: 2px solid #333; padding-bottom: 10px; }
        section { margin-bottom: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        form { display: grid; gap: 10px; }
        input, select, button { padding: 10px; width: 100%; box-sizing: border-box; }
        button { background-color: #2c3e50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #34495e; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hotel Booking System</h1>

    <!-- 1. Register Guests -->
    <section>
        <h2>Register Guest</h2>
        <form action="/register" method="POST">
            <input type="text" name="guest_name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <button type="submit">Register Guest</button>
        </form>
    </section>

    <!-- 2. Book Available Rooms -->
    <section>
        <h2>Book a Room</h2>
        <form action="/book" method="POST">
            <select name="room_type" required>
                <option value="">Select Room Type</option>
                <option value="single">Single - $100</option>
                <option value="double">Double - $150</option>
                <option value="suite">Suite - $300</option>
            </select>
            <input type="date" name="check_in" required>
            <input type="date" name="check_out" required>
            <button type="submit">Confirm Booking</button>
        </form>
    </section>

    <!-- 3. View Room Availability -->
    <section>
        <h2>Room Availability</h2>
        <table>
            <tr>
                <th>Room #</th>
                <th>Type</th>
                <th>Status</th>
            </tr>
            <tr>
                <td>101</td>
                <td>Single</td>
                <td style="color: green;">Available</td>
            </tr>
            <tr>
                <td>102</td>
                <td>Double</td>
                <td style="color: red;">Occupied</td>
            </tr>
        </table>
    </section>

    <!-- 4. Check Guests In/Out -->
    <section>
        <h2>Check-In / Check-Out</h2>
        <form action="/update-status" method="POST">
            <input type="text" name="booking_id" placeholder="Booking ID or Room #" required>
            <select name="action">
                <option value="check-in">Check-In</option>
                <option value="check-out">Check-Out</option>
            </select>
            <button type="submit">Update Status</button>
        </form>
    </section>

    <!-- 5. Admin Login -->
    <section style="background-color: #eee;">
        <h2>Administrator Login</h2>
        <form action="/admin-login" method="POST">
            <input type="text" name="username" placeholder="Admin Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login to Dashboard</button>
        </form>
    </section>
</div>

</body>
</html>
